<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020508"/>
    </radialGradient>

    <linearGradient id="swanBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="40%" stop-color="#a8d8ea"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>

    <linearGradient id="swanWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>

    <linearGradient id="neckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="100%" stop-color="#81d4fa"/>
    </linearGradient>

    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0288d1" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="170"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#00e5ff" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Hex grid background (subtle) -->
  <g clip-path="url(#circle-clip)" opacity="0.08">
    <path d="M140,80 L160,80 L170,97 L160,114 L140,114 L130,97 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M170,97 L190,97 L200,114 L190,131 L170,131 L160,114 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M200,114 L220,114 L230,131 L220,148 L200,148 L190,131 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M110,97 L130,97 L140,114 L130,131 L110,131 L100,114 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M230,131 L250,131 L260,148 L250,165 L230,165 L220,148 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M80,114 L100,114 L110,131 L100,148 L80,148 L70,131 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M140,114 L160,114 L170,131 L160,148 L140,148 L130,131 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M170,131 L190,131 L200,148 L190,165 L170,165 L160,148 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M260,148 L280,148 L290,165 L280,182 L260,182 L250,165 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M110,131 L130,131 L140,148 L130,165 L110,165 L100,148 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <path d="M200,148 L220,148 L230,165 L220,182 L200,182 L190,165 Z" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
  </g>

  <!-- Water / reflection surface -->
  <ellipse cx="200" cy="285" rx="130" ry="12" fill="#0288d1" opacity="0.15"/>
  <ellipse cx="200" cy="285" rx="110" ry="7" fill="#00e5ff" opacity="0.08"/>

  <!-- Water ripple lines -->
  <g opacity="0.2">
    <ellipse cx="200" cy="295" rx="100" ry="5" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
    <ellipse cx="200" cy="305" rx="75" ry="4" fill="none" stroke="#00e5ff" stroke-width="0.6"/>
    <ellipse cx="200" cy="313" rx="50" ry="3" fill="none" stroke="#00e5ff" stroke-width="0.5"/>
  </g>

  <!-- Swan body -->
  <ellipse cx="205" cy="255" rx="72" ry="42" fill="url(#swanBody)" filter="url(#softglow)"/>

  <!-- Swan wing (left, folded) -->
  <path d="M148,240 Q120,210 135,230 Q115,250 133,268 Q155,280 185,272 Q165,255 148,240 Z"
        fill="url(#swanWing)" opacity="0.9"/>

  <!-- Swan wing feather details -->
  <path d="M148,240 Q138,252 140,265" fill="none" stroke="#e0f7ff" stroke-width="0.8" opacity="0.6"/>
  <path d="M140,248 Q128,258 132,270" fill="none" stroke="#e0f7ff" stroke-width="0.8" opacity="0.5"/>

  <!-- Swan wing (right, slightly raised — dynamic) -->
  <path d="M262,238 Q295,200 280,228 Q300,245 282,265 Q260,278 228,272 Q248,255 262,238 Z"
        fill="url(#swanWing)" opacity="0.85"/>

  <!-- Right wing feather details -->
  <path d="M262,238 Q272,252 268,265" fill="none" stroke="#e0f7ff" stroke-width="0.8" opacity="0.6"/>
  <path d="M270,246 Q283,256 278,268" fill="none" stroke="#e0f7ff" stroke-width="0.8" opacity="0.5"/>

  <!-- Swan neck -->
  <path d="M195,260 Q188,230 178,205 Q170,178 185,158 Q192,148 200,145"
        fill="none" stroke="url(#neckGrad)" stroke-width="16" stroke-linecap="round"/>
  <path d="M195,260 Q188,230 178,205 Q170,178 185,158 Q192,148 200,145"
        fill="none" stroke="#e0f7ff" stroke-width="14" stroke-linecap="round" opacity="0.6"/>

  <!-- Swan head -->
  <ellipse cx="204" cy="140" rx="16" ry="13" fill="url(#swanBody)" filter="url(#glow)"/>
  <ellipse cx="204" cy="140" rx="14" ry="11" fill="#e0f7ff" opacity="0.7"/>

  <!-- Eye — glowing cyan circuit dot -->
  <circle cx="210" cy="136" r="4" fill="#001a2e"/>
  <circle cx="210" cy="136" r="2.5" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="210" cy="136" r="1" fill="#ffffff"/>

  <!-- Beak -->
  <path d="M216,140 L228,138 L226,143 L216,143 Z" fill="#ff6d00" opacity="0.9"/>
  <line x1="216" y1="141" x2="227" y2="140" stroke="#e65100" stroke-width="0.8"/>

  <!-- Circuit lines emanating from body — "vector" concept -->
  <g filter="url(#glow)" opacity="0.5">
    <!-- Left circuit -->
    <polyline points="148,255 118,255 108,245 88,245" fill="none" stroke="#00e5ff" stroke-width="1"/>
    <circle cx="88" cy="245" r="2.5" fill="#00e5ff"/>
    <circle cx="118" cy="255" r="1.5" fill="#00e5ff"/>

    <!-- Right circuit -->
    <polyline points="262,252 292,252 302,242 322,242" fill="none" stroke="#00e5ff" stroke-width="1"/>
    <circle cx="322" cy="242" r="2.5" fill="#00e5ff"/>
    <circle cx="292" cy="252" r="1.5" fill="#00e5ff"/>

    <!-- Down circuit -->
    <polyline points="205,295 205,320 218,333" fill="none" stroke="#00e5ff" stroke-width="1"/>
    <circle cx="218" cy="333" r="2" fill="#00e5ff"/>
  </g>

  <!-- SVAN text -->
  <text x="200" y="362"
        font-family="'Courier New', monospace"
        font-size="28"
        font-weight="bold"
        letter-spacing="12"
        fill="#00e5ff"
        text-anchor="middle"
        filter="url(#glow)">SVAN</text>

  <!-- Subtitle -->
  <text x="200" y="380"
        font-family="'Courier New', monospace"
        font-size="7"
        letter-spacing="2.5"
        fill="#4fc3f7"
        text-anchor="middle"
        opacity="0.7">SYNTHETIC VECTOR ATTACK NULLIFIER</text>

  <!-- Corner tick marks on outer ring -->
  <g stroke="#00e5ff" stroke-width="1.5" opacity="0.4">
    <line x1="200" y1="15" x2="200" y2="28"/>
    <line x1="200" y1="372" x2="200" y2="385"/>
    <line x1="15" y1="200" x2="28" y2="200"/>
    <line x1="372" y1="200" x2="385" y2="200"/>
  </g>
</svg>
